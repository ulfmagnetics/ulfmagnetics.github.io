<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firth — ULF MAGNETICS</title>
    <link rel="stylesheet" href="https://unpkg.com/fixedsys-css/css/fixedsys.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=News+Cycle&family=Lato&display=swap">
    <link rel="stylesheet" href="../../assets/style.css">
    <style>
        .file-list {
            list-style: none;
            margin-top: 2rem;
        }
        .file-list li {
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 0;
        }
        .file-list li:first-child {
            border-top: 1px solid var(--border);
        }
        .file-list a {
            color: var(--primary-color);
            text-decoration: none;
            font-family: 'fixedsys', 'Courier New', 'Courier', monospace;
            font-size: 1rem;
            letter-spacing: 0.04em;
        }
        .file-list a:hover {
            opacity: 0.8;
        }
        .file-list .ext {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        .section-heading {
            margin-top: 2.5rem;
            margin-bottom: 0.25rem;
            font-family: 'fixedsys', 'Courier New', 'Courier', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-inner">
                <div class="header-brand">
                    <a href="/">
                        <img src="../../assets/ulf-magnetics-logo.svg" alt="ULF MAGNETICS">
                    </a>
                    <p class="location"><span>Firth</span></p>
                </div>
                <a href="/" class="header-magnet">
                    <img src="../../assets/magnet-front.svg" alt="ULF MAGNETICS">
                </a>
            </div>
        </div>
    </header>

    <main class="container">

        <p class="section-heading">Demos &amp; Covers</p>
        <ul class="file-list">
            <li>
                <a href="1-guesthouseblues-demo.mp3">1 — Guesthouse Blues (Demo)</a>
                <span class="ext">mp3</span>
            </li>
            <li>
                <a href="2-mycheckingaccount-demo.mp3">2 — My Checking Account (Demo)</a>
                <span class="ext">mp3</span>
            </li>
            <li>
                <a href="3-paradiseandhell-demo.mp3">3 — Paradise and Hell (Demo)</a>
                <span class="ext">mp3</span>
            </li>
            <li>
                <a href="4-upsidedown-cover.mp3">4 — Upside Down (Cover)</a>
                <span class="ext">mp3</span>
            </li>
            <li>
                <a href="5-basementlife-cover.mp3">5 — Basement Life (Cover)</a>
                <span class="ext">mp3</span>
            </li>
        </ul>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ULF MAGNETICS &mdash; <a href="../">back to 2000s</a></p>
        </div>
    </footer>
</body>
</html>
